{% extends 'base.html' %}

{% block contenido %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8 col-xl-6">
            
            <div class="card border-0 shadow-lg p-4 p-sm-5 bg-white position-relative overflow-hidden" 
                 style="border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.04) !important;">
                
                <div class="position-absolute top-0 start-0 end-0" style="height: 6px; background: linear-gradient(90deg, #ffc107, #f97316);"></div>
                
                <div class="text-center mb-4 mt-2">
                    <h2 class="fw-extrabold text-dark mb-2" style="letter-spacing: -1px; font-weight: 800; font-family: 'Merriweather', serif;">Editar Expediente</h2>
                    <p class="text-muted small mx-auto" style="max-width: 85%;">Modifica los datos del paciente <strong>{{ cliente.nombre }} {{ cliente.apellido }}</strong>.</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label fw-bold text-dark small mb-1">
                                {{ field.label }}
                            </label>
                            
                            {{ field }} {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <div class="row g-3 pt-3 border-top border-light mt-4">
                        <div class="col-sm-7 order-sm-2">
                            <button type="submit" class="btn btn-warning text-dark w-100 py-2 fw-semibold d-flex align-items-center justify-content-center shadow-sm" 
                                    style="border-radius: 14px; background: #ffc107; border: none; height: 44px;">
                                <i class="fa-solid fa-floppy-disk me-2"></i> Actualizar Cambios
                            </button>
                        </div>
                        <div class="col-sm-5 order-sm-1">
                            <a href="{% url 'lista_clientes' %}" class="btn btn-light w-100 py-2 fw-semibold text-secondary d-flex align-items-center justify-content-center" 
                               style="border-radius: 14px; border: 1px solid #e2e8f0; height: 44px; background-color: #ffffff;">
                                Cancelar
                            </a>
                        </div>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>
{% endblock %}
